<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Calculator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">

</head>
<!--Giving everything an ID b/c of several HTML pages-->

<body>
    <nav id="main-nav">
        <img src="/images/eecu-logo.png">
    </nav>
    <header id="main-header">
        <h1>
            Monthly Budget Calculator
        </h1>
        <div class="steps"> <!--Have to change this for each page, progress bar 
            is colored in html only here at step active-->
            <div class="step active">
                <div class="circle">1</div>
            </div>

            <div class="step">
                <div class="circle">2</div>
            </div>

            <div class="step">
                <div class="circle">3</div>
            </div>

            <div class="step">
                <div class="circle">4</div>
            </div>

            <div class="step">
                <div class="circle">5</div>
            </div>
        </div>
    </header>
    <div id="main-body">
        <section>
            <!--Did not get to putting anything in, but meant for h2 and boxes 
            for the first page-->
        </section>
    </div>
    <footer id="main-footer">
        <img src="/images/eecu-logo.png">
    </footer>
</body>
<script src="/script.js"></script>

</html>
